<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}NEXUS{% endblock %} · CryptoVerdad</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        :root { --accent: #F7931A; }
        body { background: #0A0A0A; color: #FFFFFF; font-family: 'Inter', 'Segoe UI', sans-serif; }
        .accent { color: #F7931A; }
        .bg-accent { background-color: #F7931A; }
        .border-accent { border-color: #F7931A; }
        .btn-accent {
            background-color: #F7931A;
            color: #0A0A0A;
            font-weight: 700;
            padding: 0.5rem 1.25rem;
            border-radius: 0.375rem;
            transition: opacity 0.15s;
            display: inline-block;
            text-decoration: none;
        }
        .btn-accent:hover { opacity: 0.85; }
        .btn-ghost {
            border: 1px solid #F7931A;
            color: #F7931A;
            font-weight: 600;
            padding: 0.5rem 1.25rem;
            border-radius: 0.375rem;
            transition: background 0.15s;
            display: inline-block;
            text-decoration: none;
        }
        .btn-ghost:hover { background-color: rgba(247,147,26,0.1); }
        .btn-sm {
            padding: 0.25rem 0.75rem;
            font-size: 0.75rem;
        }
        .card {
            background: #141414;
            border: 1px solid #222;
            border-radius: 0.75rem;
            padding: 1.5rem;
        }
        .sidebar-link {
            display: flex;
            align-items: center;
            gap: 0.625rem;
            padding: 0.625rem 0.875rem;
            border-radius: 0.5rem;
            color: #aaa;
            text-decoration: none;
            transition: background 0.15s, color 0.15s;
        }
        .sidebar-link:hover, .sidebar-link.active {
            background: rgba(247,147,26,0.1);
            color: #F7931A;
        }
        .status-pending  { background:#444;    color:#fff; }
        .status-running  { background:#ca8a04; color:#fff; }
        .status-completed{ background:#16a34a; color:#fff; }
        .status-error    { background:#dc2626; color:#fff; }
        .status-rejected { background:#7c3aed; color:#fff; }
        .status-approved { background:#0891b2; color:#fff; }
        .status-badge {
            padding: 0.15rem 0.6rem;
            border-radius: 9999px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #F7931A; }
        /* Mobile sidebar overlay */
        #sidebar-overlay { display: none; }
        @media (max-width: 768px) {
            #sidebar { transform: translateX(-100%); transition: transform 0.25s ease; position: fixed; z-index: 50; height: 100%; }
            #sidebar.open { transform: translateX(0); }
            #sidebar-overlay.open { display: block; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 40; }
        }
    </style>
</head>
<body class="min-h-screen flex" x-data="{ sidebarOpen: false }">

    <!-- Mobile overlay -->
    <div id="sidebar-overlay" :class="sidebarOpen ? 'open' : ''" @click="sidebarOpen = false"></div>

    <!-- Sidebar -->
    <aside id="sidebar"
           :class="sidebarOpen ? 'open' : ''"
           class="w-56 min-h-screen bg-[#0D0D0D] border-r border-[#1a1a1a] flex flex-col shrink-0">
        <!-- Logo -->
        <div class="px-5 py-6 border-b border-[#1a1a1a]">
            <span class="text-xl font-black tracking-widest accent">NEXUS</span>
            <div class="text-xs text-[#555] mt-0.5">CryptoVerdad · v1.0</div>
        </div>

        <!-- Nav -->
        <nav class="flex-1 px-3 py-4 space-y-1 overflow-y-auto">
            <a href="/dashboard" class="sidebar-link {% if request.url.path == '/dashboard' %}active{% endif %}">
                <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
                Dashboard
            </a>
            <a href="/pipeline/new" class="sidebar-link {% if request.url.path == '/pipeline/new' %}active{% endif %}">
                <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                Nuevo Video
            </a>
            <a href="/pipeline-status" class="sidebar-link {% if request.url.path == '/pipeline-status' %}active{% endif %}">
                <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 3H5a2 2 0 00-2 2v4m6-6h10a2 2 0 012 2v4M9 3v18m0 0h10a2 2 0 002-2V9M9 21H5a2 2 0 01-2-2V9m0 0h18"/></svg>
                Pipeline
            </a>
            <a href="/calendar" class="sidebar-link {% if request.url.path == '/calendar' %}active{% endif %}">
                <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                Calendario
            </a>
            <a href="/history" class="sidebar-link {% if request.url.path == '/history' %}active{% endif %}">
                <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                Historial
            </a>
            <a href="/ideas" class="sidebar-link {% if request.url.path == '/ideas' %}active{% endif %}">
                <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>
                Ideas
            </a>
            <a href="/agents" class="sidebar-link {% if request.url.path == '/agents' %}active{% endif %}">
                <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                Agentes
            </a>
            <a href="/learning" class="sidebar-link {% if request.url.path == '/learning' %}active{% endif %}">
                <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
                Aprendizaje
            </a>
            <a href="/videos" class="sidebar-link {% if request.url.path == '/videos' %}active{% endif %}">
                <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.277A1 1 0 0121 8.677V15.32a1 1 0 01-1.447.894L15 14M3 8a2 2 0 012-2h8a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V8z"/></svg>
                Videos
            </a>
            <a href="/settings" class="sidebar-link {% if request.url.path == '/settings' %}active{% endif %}">
                <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                Configuracion
            </a>
        </nav>

        <!-- Logout -->
        <div class="px-3 py-4 border-t border-[#1a1a1a]">
            <a href="/logout" class="sidebar-link text-sm text-[#666] hover:text-red-400">
                <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                Cerrar sesion
            </a>
        </div>
    </aside>

    <!-- Main -->
    <div class="flex-1 flex flex-col min-h-screen min-w-0">
        <!-- Header -->
        <header class="h-14 border-b border-[#1a1a1a] flex items-center justify-between px-4 md:px-6 bg-[#0D0D0D] shrink-0">
            <div class="flex items-center gap-3">
                <!-- Hamburger (mobile) -->
                <button class="md:hidden text-[#888] hover:text-[#F7931A]" @click="sidebarOpen = !sidebarOpen">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
                </button>
                <span class="font-bold accent">NEXUS</span>
                <span class="text-[#444] text-sm hidden sm:inline">·</span>
                <span class="text-sm text-[#888] hidden sm:inline">CryptoVerdad</span>
            </div>
            <div class="flex items-center gap-3">
                <span class="text-xs text-[#555]" id="clock"></span>
                <a href="/pipeline/new" class="btn-accent text-sm py-1.5 hidden sm:inline-block">+ Nuevo Video</a>
            </div>
        </header>

        <!-- Page content -->
        <main class="flex-1 p-4 md:p-6 overflow-y-auto">
            {% block content %}{% endblock %}
        </main>
    </div>

    <script>
        function updateClock() {
            const el = document.getElementById('clock');
            if (el) el.textContent = new Date().toLocaleTimeString('es-ES');
        }
        updateClock();
        setInterval(updateClock, 1000);
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>

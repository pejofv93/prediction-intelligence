name: polymarket-enrich
on:
  schedule:
    - cron: '30 3,9,15,21 * * *'
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Trigger Cloud Run
        run: |
          curl -X POST "${{ secrets.POLY_AGENT_URL }}/run-enrich" \
            -H "Content-Type: application/json" \
            -H "x-cloud-token: ${{ secrets.CLOUD_RUN_TOKEN }}" \
            --max-time 600 \
            --fail --silent --show-error

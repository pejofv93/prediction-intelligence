name: daily-report
on:
  schedule:
    - cron: '0 7 * * *'  # 07:00 UTC = 09:00 Europe/Madrid (CEST)
  workflow_dispatch:
jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Send daily report
        run: |
          curl -X POST "${{ secrets.TELEGRAM_BOT_URL }}/daily-report" \
            -H "x-cloud-token: ${{ secrets.CLOUD_RUN_TOKEN }}" \
            --max-time 60 --retry 2 --retry-delay 5 --fail --silent --show-error

name: sports-analyze
on:
  schedule:
    - cron: '0 1,7,13,19 * * *'
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Trigger Cloud Run (sync)
        run: |
          curl -X POST "${{ secrets.SPORTS_AGENT_URL }}/run-analyze" \
            -H "Content-Type: application/json" \
            -H "x-cloud-token: ${{ secrets.CLOUD_RUN_TOKEN }}" \
            --max-time 840 \
            --no-buffer \
            --fail --silent --show-error

name: sports-collect
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Trigger Cloud Run (sync)
        run: |
          curl -X POST "${{ secrets.SPORTS_AGENT_URL }}/run-collect" \
            -H "Content-Type: application/json" \
            -H "x-cloud-token: ${{ secrets.CLOUD_RUN_TOKEN }}" \
            --max-time 2400 \
            --no-buffer \
            --fail --silent --show-error

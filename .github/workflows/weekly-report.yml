name: weekly-report
on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Cloud Run — weekly report
        run: |
          curl -X POST "${{ secrets.TELEGRAM_BOT_URL }}/send-weekly-report" \
            -H "Content-Type: application/json" \
            -H "x-cloud-token: ${{ secrets.CLOUD_RUN_TOKEN }}" \
            --connect-timeout 10 \
            --max-time 60 \
            --retry 1 \
            --retry-delay 5 \
            --fail --silent --show-error

      - name: Trigger production backtest (actualiza model_weights con datos reales)
        run: |
          curl -X POST "${{ secrets.SPORTS_AGENT_URL }}/run-production-backtest" \
            -H "Content-Type: application/json" \
            -H "x-cloud-token: ${{ secrets.CLOUD_RUN_TOKEN }}" \
            --connect-timeout 10 \
            --max-time 30 \
            --retry 1 \
            --retry-delay 5 \
            --fail --silent --show-error || true

name: reset-and-analyze
on:
  workflow_dispatch:

env:
  PROJECT: prediction-intelligence

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install google-cloud-firestore

      - name: Authenticate GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Clear alerts_sent
        run: |
          python - <<'EOF'
          from google.cloud import firestore
          PREFIX = "prod"
          db = firestore.Client(project="prediction-intelligence")
          docs = list(db.collection(f"{PREFIX}alerts_sent").stream())
          for doc in docs:
              doc.reference.delete()
          print(f"{PREFIX}alerts_sent: {len(docs)} documentos borrados")
          EOF

      - name: Trigger run-analyze (sync — espera completion)
        run: |
          curl -X POST "${{ secrets.SPORTS_AGENT_URL }}/run-analyze" \
            -H "x-cloud-token: ${{ secrets.CLOUD_RUN_TOKEN }}" \
            --max-time 300 \
            --no-buffer \
            --fail --silent --show-error

      - name: Count signals in predictions
        run: |
          python - <<'EOF'
          from google.cloud import firestore
          PREFIX = "prod"
          db = firestore.Client(project="prediction-intelligence")
          docs = list(db.collection(f"{PREFIX}predictions").stream())

          total = len(docs)
          by_sport = {}
          h2h_excluido = 0

          for doc in docs:
              d = doc.to_dict()
              sport = d.get("sport", "?")
              by_sport[sport] = by_sport.get(sport, 0) + 1
              if "h2h" not in d.get("signals", {}):
                  h2h_excluido += 1

          print(f"\n=== SEÑALES EN {PREFIX}predictions ({total} total) ===")
          for sport, count in sorted(by_sport.items(), key=lambda x: -x[1]):
              print(f"  {sport:15s}: {count}")
          print(f"\nH2H excluido del ensemble : {h2h_excluido} / {total}")
          print()
          EOF

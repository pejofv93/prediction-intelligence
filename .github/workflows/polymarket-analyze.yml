name: polymarket-analyze
on:
  schedule:
    - cron: '0 4,10,16,22 * * *'
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Trigger Cloud Run
        run: |
          curl -X POST "${{ secrets.POLY_AGENT_URL }}/run-analyze" \
            -H "Content-Type: application/json" \
            -H "x-cloud-token: ${{ secrets.CLOUD_RUN_TOKEN }}" \
            --max-time 300 \
            --fail --silent --show-error

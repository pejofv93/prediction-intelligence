name: polymarket-scan
on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Trigger Cloud Run (sync)
        run: |
          curl -X POST "${{ secrets.POLY_AGENT_URL }}/run-scan" \
            -H "Content-Type: application/json" \
            -H "x-cloud-token: ${{ secrets.CLOUD_RUN_TOKEN }}" \
            --max-time 1400 \
            --no-buffer \
            --fail --silent --show-error

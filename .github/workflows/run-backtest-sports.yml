name: run-backtest-sports
on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 1 * *'  # Mensual, dia 1 a las 02:00 UTC

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger backtest (fire-and-forget)
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.SPORTS_AGENT_URL }}/run-backtest" \
            -H "x-cloud-token: ${{ secrets.CLOUD_RUN_TOKEN }}" \
            --max-time 15)
          echo "HTTP status: $STATUS"
          if [ "$STATUS" = "202" ]; then
            echo "✅ Backtest iniciado en background (202 Accepted)"
          elif [ "$STATUS" = "409" ]; then
            echo "⚠️ Backtest ya en ejecución (409 Conflict) — omitiendo"
          else
            echo "❌ Error inesperado HTTP $STATUS"
            exit 1
          fi

      - name: Wait and verify started
        run: |
          echo "Esperando 30s para confirmar que el backtest arrancó..."
          sleep 30
          curl -s "${{ secrets.SPORTS_AGENT_URL }}/backtest/status" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          print('Estado:', d.get('running'), '| started:', d.get('started_at'))
          "
          echo "✅ Backtest corriendo en background. Durará 30-60 min."
          echo "   Consultar progreso: GET ${{ secrets.SPORTS_AGENT_URL }}/backtest/status"

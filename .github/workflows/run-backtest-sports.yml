name: run-backtest-sports
on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 1 * *'  # Mensual, dia 1 a las 02:00 UTC
jobs:
  backtest:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Cloud Run
        run: |
          curl -X POST "${{ secrets.SPORTS_AGENT_URL }}/run-backtest" \
            -H "x-cloud-token: ${{ secrets.CLOUD_RUN_TOKEN }}" \
            --max-time 30 --retry 2 --retry-delay 5 --fail --silent --show-error
